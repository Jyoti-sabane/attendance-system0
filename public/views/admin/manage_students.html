<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/admin/dashboard" class="navbar-brand">Attendance System - Admin</a>
        <ul class="navbar-nav">
            <li><a href="/admin/dashboard">Dashboard</a></li>
            <li><a href="/admin/manage_students">Manage Students</a></li>
            <li><a href="/admin/assign_staff_subjects">Assign Teachers</a></li>
            <li><a href="/admin/view_attendance">View Attendance</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Manage Students</h1>
            <a href="/admin/add_student" class="btn btn-primary">Add New Student</a>
        </div>
        
        <div id="message"></div>
        
        <div class="table-container">
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>Roll Number</th>
                        <th>Student Name</th>
                        <th>Email</th>
                        <th>Branch</th>
                        <th>Year</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentsBody">
                    <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="/js/main.js"></script>
    <script>
        async function loadStudents() {
            try {
                const response = await fetch('/admin/api/students');
                const students = await response.json();
                
                const tbody = document.getElementById('studentsBody');
                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No students found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = students.map(student => `
                    <tr>
                        <td>${escapeHtml(student.roll_number)}</td>
                        <td>${escapeHtml(student.student_name)}</td>
                        <td>${escapeHtml(student.email || '-')}</td>
                        <td>${escapeHtml(student.branch || '-')}</td>
                        <td>${student.year}</td>
                        <td>
                            <a href="/admin/edit_student?id=${student._id}" class="btn btn-primary" style="padding: 5px 10px; font-size: 14px;">Edit</a>
                            <button onclick="deleteStudent('${student._id}')" class="btn btn-danger" style="padding: 5px 10px; font-size: 14px;">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('studentsBody').innerHTML = '<tr><td colspan="6" style="text-align: center;">Error loading students</td></tr>';
            }
        }
        
        async function deleteStudent(id) {
            if (!confirmDelete('Are you sure you want to delete this student?')) return;
            
            try {
                const response = await fetch(`/admin/api/students/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                
                if (result.success) {
                    showNotification(result.message, 'success');
                    loadStudents();
                } else {
                    showNotification(result.error, 'danger');
                }
            } catch (error) {
                showNotification('Error deleting student', 'danger');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadStudents();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Attendance Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card" style="max-width: 400px; width: 100%;">
            <h2 style="text-align: center; margin-bottom: 30px;">Attendance Management System</h2>
            <h3 style="text-align: center; margin-bottom: 20px;">Login</h3>
            
            <div id="message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" class="form-control" id="username" name="username" required autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required autocomplete="off">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="/register">Register here</a>
            </p>
        </div>
    </div>
    
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.error) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
            } else {
                window.location.href = result.redirect;
            }
        });
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('logout')) {
            document.getElementById('message').innerHTML = '<div class="alert alert-success">You have been logged out successfully.</div>';
        }
        if (urlParams.get('timeout')) {
            document.getElementById('message').innerHTML = '<div class="alert alert-warning">Session expired. Please login again.</div>';
        }
    </script>
</body>
</html>
